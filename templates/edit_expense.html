{% extends "base.html" %}

{% block title %}Edit Expense — Spendly{% endblock %}

{% block content %}
<section class="expense-page">
    <div class="expense-container">
        <header class="expense-header">
            <p class="profile-kicker">Update transaction</p>
            <h1>Edit expense</h1>
        </header>

        <section class="profile-card expense-card">
            {% if error %}
            <p class="expense-error" role="alert">{{ error }}</p>
            {% endif %}

            <form method="post" action="/expenses/{{ expense.id }}/edit" class="expense-form">
                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input class="form-input" id="amount" type="number" name="amount" step="0.01" min="0.01" value="{{ values.amount }}" required>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select class="form-input" id="category" name="category" required>
                        <option value="" disabled{% if not values.category %} selected{% endif %}>Select a category</option>
                        {% for category in categories %}
                        <option value="{{ category }}"{% if values.category == category %} selected{% endif %}>{{ category }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input class="form-input" id="date" type="date" name="date" value="{{ values.date }}" required>
                </div>

                <div class="form-group">
                    <label for="description">Description <span class="field-optional">Optional</span></label>
                    <input class="form-input" id="description" type="text" name="description" value="{{ values.description }}" maxlength="200">
                </div>

                <div class="expense-actions">
                    <button class="btn-primary" type="submit">Save Changes</button>
                    <a class="btn-ghost" href="{{ url_for('profile') }}">Cancel</a>
                </div>
            </form>
        </section>
    </div>
</section>
{% endblock %}
